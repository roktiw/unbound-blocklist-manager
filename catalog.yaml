# UBG Universal Blocklist Catalog
# Single source of truth: Sources, Formats, and Exceptions

categories:
  - id: ads
    name: "Ads & Tracking"
  - id: malware
    name: "Malicious Software (Malware, Phishing)"
  - id: scam
    name: "Scams & Fraud"
  - id: privacy
    name: "Privacy & Telemetry"

sources:
  # 🟢 GLOBAL TIER 1
  - id: oisd_big
    name: "OISD Big"
    url: "https://big.oisd.nl/domainswild"
    format: "domains_wildcard"
    category: ["ads", "malware"]
    region: "global"
    description: "De facto standard. Aggregator minimizing FP. Excludes warez/porn."
    recommended: true

  - id: stevenblack_hosts
    name: "StevenBlack Hosts"
    url: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
    format: "hosts"
    category: ["ads"]
    region: "global"
    description: "Stable classic, commonly used with Pi-hole."
    recommended: true

  - id: hagezi_pro
    name: "HaGeZi Pro"
    url: "https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/pro.txt"
    format: "adblock"
    category: ["ads", "privacy", "malware"]
    region: "global"
    description: "Broad coverage including telemetry and VPN-detection evasion."
    recommended: false
    
  - id: easylist
    name: "EasyList"
    url: "https://easylist.to/easylist/easylist.txt"
    format: "adblock"
    category: ["ads"]
    region: "global"
    description: "Industry-standard ad filter. Very aggressive footprint."
    recommended: false

  - id: easyprivacy
    name: "EasyPrivacy"
    url: "https://easylist.to/easylist/easyprivacy.txt"
    format: "adblock"
    category: ["privacy"]
    region: "global"
    description: "Primary filter for analytic and tracking domains."
    recommended: true

  # 🟢 SECURITY MUST-HAVE
  - id: abuse_urlhaus
    name: "abuse.ch URLhaus"
    url: "https://urlhaus.abuse.ch/downloads/hostfile/"
    format: "hosts"
    category: ["malware"]
    region: "global"
    description: "Malicious URLs, malware, botnets. Daily updates."
    recommended: true

  # 🇵🇱 REGIONAL: POLAND
  - id: cert_pl_hole
    name: "CERT Polska Hole"
    url: "https://hole.cert.pl/domains/v2/domains.txt"
    format: "domains_plain"
    category: ["malware", "scam"]
    region: "pl"
    description: "Government-maintained list of malicious sites in PL. Absolute necessity."
    recommended: true

  - id: majkiit_ads
    name: "MajkiIT Polish Ads Filter"
    url: "https://raw.githubusercontent.com/MajkiIT/polish-ads-filter/master/polish-pihole-filters/adservers.txt"
    format: "hosts"
    category: ["ads"]
    region: "pl"
    description: "Counters ads and tracking scripts on Polish portals (Onet, WP, etc.)."
    recommended: true

  - id: kadhosts
    name: "KADhosts (FiltersHeroes)"
    url: "https://raw.githubusercontent.com/FiltersHeroes/KADhosts/master/KADhosts.txt"
    format: "hosts"
    category: ["scam", "ads"]
    region: "pl"
    description: "Polish list focused on scams and internet fraudsters."
    recommended: true

# 🛡️ EXCEPTIONS (WHITELISTS)
# Users define overrides ensuring core functionality is preserved.
exceptions_groups:
  - id: whitelist_apple_telemetry
    name: "Allow Apple Telemetry"
    description: "Prevents smart-home, iCloud, or Apple device connectivity issues."
    domains:
      - "metrics.apple.com"
      - "securemetrics.apple.com"
      - "supportmetrics.apple.com"
      - "smp-device-content.apple.com"

  - id: whitelist_microsoft_telemetry
    name: "Allow Microsoft Telemetry"
    description: "Critical for seamless Windows Update and Xbox Live functionality."
    domains:
      - "vortex.data.microsoft.com"
      - "telemetry.microsoft.com"
      - "settings-win.data.microsoft.com"
      - "watson.telemetry.microsoft.com"

  - id: whitelist_polish_portals
    name: "Allow Polish Portal Domains"
    description: "Protection against breaking layouts (False Positives) on WP, Onet, Gazeta."
    domains:
      - "wp.pl"
      - "onet.pl"
      - "gazeta.pl"
      - "interia.pl"
